<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="”X-UA-Compatible”" content="”IE-edge”" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kim Jones</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>

  <body>
    <nav>
      <figure>
        <img
          id="personal-logo"
          src="./assets/kim-logo-2.jpg"
          alt="Personal Logo"
        />
      </figure>
      <ul class="nav__link--list">
        <li class="nav__link">
          <a
            href="#"
            class="nav__link--anchor link__hover-effect link__hover-effect--black"
            >About</a
          >
        </li>
        <li class="nav__link">
          <a
            href="#"
            class="nav__link--anchor link__hover-effect link__hover-effect--black"
            >Projects</a
          >
        </li>
        <li class="nav__link">
          <a
            href="#"
            class="nav__link--anchor link__hover-effect link__hover-effect--black"
            >Contact</a
          >
        </li>
        <li class="nav__link click">
          <a
            href="#"
            class="nav__link--anchor link__hover-effect link__hover-effect--black"
          >
            <i class="fa-solid fa-circle-half-stroke"></i
          ></a>
        </li>
      </ul>
    </nav>
    <section id="landing-page">
      <header class="header">
        <div class="header__content">
          <h1 class="title">Hey</h1>
          <h1 class="title title--secondary">I'm Kim</h1>
          <p class="header__para">
            I'm a <b class="purple">Frontend Software Engineer</b> with a
            passion for building web applications with great user experiences.
            <br />
            Here's a bit more <b class="purple">about me</b>.
          </p>
          <div class="social__list">
            <a
              href="https://www.linkedin.com/in/kim-jones-29431249/"
              target="_blank"
              class="social__link click"
              aria-label="LinkedIn"
            >
              <i class="fa-brands fa-linkedin"></i>
            </a>
            <a
              href="https://github.com/Ladyk59?tab=repositories"
              target="_blank"
              class="social__link click"
              aria-label="GitHub"
            >
              <i class="fa-brands fa-github"></i>
            </a>
            <a
              href="./assets/kim-resume-2026.docx"
              target="_blank"
              class="social__link click"
              aria-label="Resume"
            >
              <i class="fa-regular fa-file"></i>
            </a>
          </div>
        </div>
      </header>
      <button class="mail__btn click">
        <i class="fa-regular fa-envelope"></i>
      </button>
      <a href="#projects" class="scroll">
        <div class="scroll__icon click"></div>
      </a>
    </section>
  </body>
</html>
